<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect.Me Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-body light-theme">
    <main class="page-shell options-shell">
      <header class="page-header card soft-card">
        <div>
          <p class="eyebrow">Connect.Me</p>
          <h1>Extension settings overview</h1>
          <p class="subtitle">Review your configuration, privacy controls, and policy details in a full-page layout.</p>
        </div>
      </header>

      <section id="optionsStatus" class="status-banner hidden"></section>

      <section class="grid-two">
        <article class="card stack-md">
          <h2>Supabase configuration</h2>
          <div id="configSummary" class="stack-sm"></div>
        </article>

        <article class="card stack-md">
          <h2>Privacy summary</h2>
          <div id="privacySummary" class="stack-sm"></div>
        </article>
      </section>

      <section class="grid-two">
        <article class="card stack-md">
          <h2>Profile readiness</h2>
          <div id="profileSummary" class="stack-sm"></div>
        </article>

        <article class="card stack-md">
          <h2>Helpful actions</h2>
          <div class="button-column">
            <button id="openPopupButton" type="button">Open extension popup</button>
            <button id="openPrivacyButton" type="button" class="secondary">Open privacy policy page</button>
          </div>
        </article>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
